<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Photo Map - Japan</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- Leaflet.markercluster -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Japan <span class="subtitle">map &amp; timeline</span></h1>
      <div class="header-info" id="header-info"></div>
    </header>

    <!-- Loading / error state -->
    <div id="status" class="status">Loading album...</div>

    <main class="stage" id="stage">
      <!-- Main area: map -->
      <section class="map-area" id="map-area">
        <div id="map"></div>
      </section>

      <!-- Main area when viewing a photo: viewer -->
      <section class="viewer-area hidden" id="viewer-area">
        <button class="viewer-close" id="viewer-close" title="Close (Esc)">&times;</button>
        <button class="viewer-nav prev" id="viewer-prev" title="Previous">&#8249;</button>
        <button class="viewer-nav next" id="viewer-next" title="Next">&#8250;</button>
        <button class="viewer-play" id="viewer-play" title="Slideshow">&#9658;</button>

        <div class="viewer-content" id="viewer-content"></div>

        <!-- Mini-map overlay -->
        <div class="mini-map" id="mini-map"></div>
      </section>
    </main>

    <!-- Bottom timeline -->
    <footer class="timeline" id="timeline">
      <div class="timeline-controls">
        <button id="tl-play" title="Slideshow">&#9658;</button>
        <label class="tl-interval" title="Seconds shown per photo/video in the slideshow">
          <input id="tl-interval" type="number" min="1" max="60" step="1" value="3" />
          <span>s</span>
        </label>
        <span class="tl-date" id="tl-date"></span>
      </div>
      <div class="timeline-track-wrap">
        <button class="tl-edge prev" id="tl-prev" title="Previous">&#8249;</button>
        <div class="timeline-track" id="timeline-track"></div>
        <button class="tl-edge next" id="tl-next" title="Next">&#8250;</button>
      </div>
    </footer>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- App (ES modules) -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
