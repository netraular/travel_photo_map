<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Photo Map - Japon</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- Leaflet.markercluster -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Japon <span class="subtitle">mapa y timeline</span></h1>
      <div class="header-info" id="header-info"></div>
    </header>

    <!-- Estado de carga / error -->
    <div id="status" class="status">Cargando album...</div>

    <main class="stage" id="stage">
      <!-- Area principal: mapa -->
      <section class="map-area" id="map-area">
        <div id="map"></div>
      </section>

      <!-- Area principal cuando se ve una foto: visor -->
      <section class="viewer-area hidden" id="viewer-area">
        <button class="viewer-close" id="viewer-close" title="Cerrar (Esc)">&times;</button>
        <button class="viewer-nav prev" id="viewer-prev" title="Anterior">&#8249;</button>
        <button class="viewer-nav next" id="viewer-next" title="Siguiente">&#8250;</button>
        <button class="viewer-play" id="viewer-play" title="Slideshow">&#9658;</button>

        <div class="viewer-content" id="viewer-content"></div>
        <div class="viewer-caption" id="viewer-caption"></div>

        <!-- Mini-mapa en overlay -->
        <div class="mini-map" id="mini-map"></div>
      </section>
    </main>

    <!-- Timeline inferior -->
    <footer class="timeline" id="timeline">
      <div class="timeline-controls">
        <button id="tl-play" title="Slideshow">&#9658;</button>
        <button id="tl-prev" title="Anterior">&#8249;</button>
        <button id="tl-next" title="Siguiente">&#8250;</button>
        <span class="tl-date" id="tl-date"></span>
      </div>
      <div class="timeline-track" id="timeline-track"></div>
    </footer>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- App (modulos ES) -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
